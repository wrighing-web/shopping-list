<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul ❤️ Steph's Shopping List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --border: #e8e0d4;
    --accent: #2d6a4f; --accent-light: #e8f4ee; --accent2: #e76f51;
    --text: #1a1a1a; --muted: #8a8278; --done-bg: #f0f0ee; --done-text: #b0a898;
    --shadow: 0 2px 12px rgba(0,0,0,0.07); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 60px; }
  header { background: var(--accent); padding: 28px 20px 24px; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.07) 0%, transparent 70%); }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: white; letter-spacing: 0.01em; position: relative; }
  header p { color: rgba(255,255,255,0.65); font-size: 0.82rem; margin-top: 4px; font-weight: 300; position: relative; }
  .sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f0a500; margin-right: 5px; vertical-align: middle; transition: background 0.3s; }
  .sync-dot.live { background: #52d68a; }
  .container { max-width: 540px; margin: 0 auto; padding: 24px 16px; }
  .add-form { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 24px; border: 1px solid var(--border); }
  .add-form h2 { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-row input, .form-row select { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .input-item { flex: 1; min-width: 120px; }
  .input-qty { width: 72px; }
  .input-cat { flex: 1; min-width: 120px; }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn-add:hover { background: #245a42; }

  /* SEND LIST BUTTON */
  .send-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .send-bar-text { flex: 1; font-size: 0.84rem; color: var(--muted); min-width: 160px; }
  .send-bar-text strong { color: var(--text); display: block; font-size: 0.88rem; margin-bottom: 2px; }
  .btn-send { background: #25D366; color: white; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .btn-send:hover { background: #1da851; }
  .btn-send:disabled { background: #aaa; cursor: not-allowed; }

  .progress-wrap { margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .category-block { margin-bottom: 20px; }
  .category-title { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .cat-count { margin-left: auto; background: var(--accent-light); color: var(--accent); font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; font-family: monospace; }
  .item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 6px; transition: all 0.2s; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .item.done { background: var(--done-bg); border-color: transparent; }
  .item-check { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .item-check:hover { border-color: var(--accent); }
  .item.done .item-check { background: var(--accent); border-color: var(--accent); }
  .item.done .item-check::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .item-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
  .item.done .item-name { text-decoration: line-through; color: var(--done-text); font-weight: 400; }
  .item-qty { font-size: 0.75rem; font-weight: 600; color: var(--accent2); background: #fef3ee; border: 1px solid #f9d4c4; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .item.done .item-qty { opacity: 0.4; }
  .item-delete { width: 26px; height: 26px; border-radius: 50%; border: none; background: none; color: #ccc; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; }
  .item-delete:hover { background: #fdecea; color: #c0392b; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty p { font-size: 0.88rem; line-height: 1.6; }
  .footer-actions { display: flex; justify-content: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .btn-clear { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 7px 16px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .btn-clear:hover { border-color: #c0392b; color: #c0392b; }
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.88rem; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; font-size: 0.82rem; padding: 10px 18px; border-radius: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>🛒 Paul ❤️ Steph's Shopping List</h1>
  <p><span class="sync-dot" id="sync-dot"></span><span id="sync-label">Connecting…</span></p>
</header>

<div class="container">

  <div class="add-form">
    <h2>Add an item</h2>
    <div class="form-row">
      <input class="input-item" id="inp-name" type="text" placeholder="Item name…" autocomplete="off">
      <input class="input-qty" id="inp-qty" type="text" placeholder="Qty" autocomplete="off">
    </div>
    <div class="form-row">
      <select class="input-cat" id="inp-cat">
        <option value="Fruit & Veg">🥦 Fruit &amp; Veg</option>
        <option value="Dairy & Eggs">🥛 Dairy &amp; Eggs</option>
        <option value="Meat & Fish">🥩 Meat &amp; Fish</option>
        <option value="Bakery">🍞 Bakery</option>
        <option value="Tins & Dry Goods">🥫 Tins &amp; Dry Goods</option>
        <option value="Frozen">🧊 Frozen</option>
        <option value="Drinks">🥤 Drinks</option>
        <option value="Cleaning & Home">🧹 Cleaning &amp; Home</option>
        <option value="Other">📦 Other</option>
      </select>
      <button class="btn-add" onclick="addItem()">+ Add</button>
    </div>
  </div>

  <!-- Send notification bar -->
  <div class="send-bar" id="send-bar">
    <div class="send-bar-text">
      <strong>Send via WhatsApp</strong>
      Notify both phones with the current list
    </div>
    <button class="btn-send" id="btn-send" onclick="sendWhatsApp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.533 5.854L.057 23.885a.5.5 0 0 0 .606.61l6.208-1.63A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.9a9.9 9.9 0 0 1-5.031-1.371l-.361-.214-3.733.981.997-3.648-.235-.374A9.862 9.862 0 0 1 2.1 12C2.1 6.534 6.534 2.1 12 2.1c5.466 0 9.9 4.434 9.9 9.9 0 5.466-4.434 9.9-9.9 9.9z"/></svg>
      Send List Now
    </button>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none;">
    <div class="progress-label">
      <span id="progress-text">0 of 0 collected</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="list-container"><div class="loading">Connecting to your shared list…</div></div>

  <div class="footer-actions" id="footer-actions" style="display:none;">
    <button class="btn-clear" onclick="clearDone()">Remove collected items</button>
    <button class="btn-clear" onclick="clearAll()">Clear entire list</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://shopping-list-d9730-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const listRef = ref(db, 'items');

  // WhatsApp config — both recipients
  const WA_RECIPIENTS = [
    { phone: '447817353908', apikey: '9602467' },  // Paul
    { phone: '447545228790', apikey: '1307440' }   // Steph
  ];

  const CATEGORY_EMOJIS = {
    'Fruit & Veg':'🥦','Dairy & Eggs':'🥛','Meat & Fish':'🥩',
    'Bakery':'🍞','Tins & Dry Goods':'🥫','Frozen':'🧊',
    'Drinks':'🥤','Cleaning & Home':'🧹','Other':'📦'
  };

  let currentItems = [];
  let notificationSentForSession = false;

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), duration);
  }

  // Build WhatsApp message from current items
  function buildMessage(items) {
    if (items.length === 0) return 'The shopping list is currently empty.';
    const cats = {};
    items.filter(i => !i.done).forEach(item => {
      if (!cats[item.cat]) cats[item.cat] = [];
      cats[item.cat].push(item);
    });
    let msg = '🛒 *Shopping List*\n\n';
    Object.entries(cats).forEach(([cat, catItems]) => {
      const emoji = CATEGORY_EMOJIS[cat] || '📦';
      msg += `*${emoji} ${cat}*\n`;
      catItems.forEach(i => { msg += `  • ${i.name} (${i.qty})\n`; });
      msg += '\n';
    });
    msg += '_Open the list: https://paulwrighting.github.io/shopping-list/_';
    return msg;
  }

  // Send WhatsApp to both recipients
  window.sendWhatsApp = async function() {
    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const message = buildMessage(currentItems);
    const encoded = encodeURIComponent(message);

    let allOk = true;
    for (const r of WA_RECIPIENTS) {
      try {
        await fetch(`https://api.callmebot.com/whatsapp.php?phone=${r.phone}&text=${encoded}&apikey=${r.apikey}`);
      } catch(e) {
        allOk = false;
      }
    }

    showToast(allOk
      ? '✅ List sent to both phones via WhatsApp!'
      : '⚠️ There was a problem sending — try again', 4000);

    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.533 5.854L.057 23.885a.5.5 0 0 0 .606.61l6.208-1.63A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.9a9.9 9.9 0 0 1-5.031-1.371l-.361-.214-3.733.981.997-3.648-.235-.374A9.862 9.862 0 0 1 2.1 12C2.1 6.534 6.534 2.1 12 2.1c5.466 0 9.9 4.434 9.9 9.9 0 5.466-4.434 9.9-9.9 9.9z"/></svg> Send List Now`;
  };

  // Firebase
  let initialLoadDone = false;
  let previousItemIds = new Set();

  onValue(listRef, (snapshot) => {
    document.getElementById('sync-dot').classList.add('live');
    document.getElementById('sync-label').textContent = 'Live — syncing in real time';
    const data = snapshot.val();
    currentItems = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];

    if (!initialLoadDone) {
      currentItems.forEach(i => previousItemIds.add(i.id));
      initialLoadDone = true;
      render(currentItems);
      return;
    }

    // Check if any genuinely new items were added
    const newItems = currentItems.filter(i => !previousItemIds.has(i.id));
    if (newItems.length > 0) {
      newItems.forEach(i => previousItemIds.add(i.id));
    }

    render(currentItems);
  });

  window.addItem = function() {
    const name = document.getElementById('inp-name').value.trim();
    const qty  = document.getElementById('inp-qty').value.trim() || '1';
    const cat  = document.getElementById('inp-cat').value;
    if (!name) { document.getElementById('inp-name').focus(); return; }
    push(listRef, { name, qty, cat, done: false, ts: Date.now() });
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-qty').value = '';
    document.getElementById('inp-name').focus();
  };

  window.toggleDone = function(id, current) {
    update(ref(db, 'items/' + id), { done: !current });
  };

  window.deleteItem = function(id) {
    remove(ref(db, 'items/' + id));
  };

  window.clearDone = function() {
    if (!confirm('Remove all collected items?')) return;
    onValue(listRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      Object.entries(data).forEach(([id, val]) => { if (val.done) remove(ref(db, 'items/' + id)); });
    }, { onlyOnce: true });
  };

  window.clearAll = function() {
    if (!confirm('Clear the entire shopping list?')) return;
    remove(listRef);
    notificationSentForSession = false;
    previousItemIds.clear();
  };

  function render(items) {
    const container = document.getElementById('list-container');
    const total = items.length;
    const done  = items.filter(i => i.done).length;

    document.getElementById('progress-wrap').style.display = total > 0 ? 'block' : 'none';
    document.getElementById('progress-text').textContent = done + ' of ' + total + ' collected';
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('footer-actions').style.display = total > 0 ? 'flex' : 'none';

    if (total === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">🛍️</div><p>Your list is empty.<br>Add your first item above.</p></div>';
      return;
    }

    items.sort((a, b) => (a.ts || 0) - (b.ts || 0));
    const cats = {};
    items.forEach(item => { if (!cats[item.cat]) cats[item.cat] = []; cats[item.cat].push(item); });

    let html = '';
    Object.entries(cats).forEach(([cat, catItems]) => {
      const emoji = CATEGORY_EMOJIS[cat] || '📦';
      const catDone = catItems.filter(i => i.done).length;
      html += `<div class="category-block">
        <div class="category-title"><span>${emoji}</span> ${escHtml(cat)}<span class="cat-count">${catDone}/${catItems.length}</span></div>`;
      catItems.forEach(item => {
        html += `<div class="item${item.done ? ' done' : ''}">
          <div class="item-check" onclick="toggleDone('${item.id}', ${item.done})"></div>
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-qty">${escHtml(item.qty)}</div>
          <button class="item-delete" onclick="deleteItem('${item.id}')" title="Remove">×</button>
        </div>`;
      });
      html += '</div>';
    });
    container.innerHTML = html;
  }

  document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') window.addItem(); });
  document.getElementById('inp-qty').addEventListener('keydown', e => { if (e.key === 'Enter') window.addItem(); });
</script>
</body>
</html>
